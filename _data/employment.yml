card-loop:
  - heading: Vice President of Mission Delivery
    image: /uploads/EFAFCCPics/cfpfcc.jpg
    alt: ''
    overline:
    short-description_html: >-
      <p>The Vice President of Mission Delivery is a key executive leadership
      role responsible for advancing Angel Foundation’s™ mission delivery
      strategy, operational excellence, and community impact. Reporting directly
      to the President &amp; CEO, the VP of Mission Delivery provides strategic
      leadership and oversight for all mission-focused programming and services,
      including:</p><p>● Emergency Financial Assistance (EFA)</p><p>● Financial
      Cancer Care (FCC)</p><p>● Adult &amp; Family Programs (AFP)</p><p>● Angel
      Packs™</p><p>● Health Equity &amp; Community Outreach</p><p>● Future
      mission delivery initiatives and program expansion
      opportunities</p><p>This leader will play a central role in strengthening
      Angel Foundation’s™ statewide impact by building scalable systems,
      fostering strategic partnerships, improving operational effectiveness, and
      ensuring exceptional service delivery for cancer patients and
      families.</p><p>The ideal candidate is a visionary and highly
      collaborative leader with strong nonprofit/ healthcare experience,
      exceptional relationship-building skills, and a passion for serving
      individuals and families experiencing hardship.</p>
    location: 1155 Centre Pointe Dr, Ste 7, Mendota Heights, MN, 55120
    commitment: Full Time
    minimum-experience: 7+
    salary-range: '$102,000-$108,000 '
